name: Keepalive

on:
  workflow_call:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keep workflow alive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          workflow_id=$(gh api "repos/${{ github.repository }}/actions/workflows" \
            --jq ".workflows[] | select(.name == env.GITHUB_WORKFLOW) | .id")
          gh api --method PUT "repos/${{ github.repository }}/actions/workflows/${workflow_id}/enable"
